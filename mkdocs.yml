site_name: msgFlux
site_url: https://msgflux.com/
site_author: Vilson Rodrigues
site_description: >-
  An engine for build dynamic AI systems.
copyright: |
    &copy; 2025 <a href="https://github.com/msgflux"  target="_blank" rel="noopener">msgFlux</a>

repo_url: https://github.com/msgflux/msgflux
repo_name: msgflux/msgflux

theme:
  name: material
  language: en
  logo: assets/logo-symbol-bg.png
  favicon: assets/logo-symbol-bg.png
  icon:
    repo: fontawesome/brands/github
  features:
    # Navigation
    - navigation.tabs
    #- navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.footer
    - navigation.tracking
    - navigation.path
    # Header
    - header.autohide
    # Blog
    - blog
    # Table of Contents
    - toc.follow
<<<<<<< HEAD
    # - toc.integrate  # Disabled: keeps TOC separate from navigation
=======
    #- toc.integrate
>>>>>>> main
    # Search
    - search.suggest
    - search.highlight
    - search.share
    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    # Announce
    - announce.dismiss
  palette:
    - scheme: default
      primary: white
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - blog
  - search
  - copy-markdown:
      button_text: "Copy Page"
      button_position: "after-title"
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_if_no_docstring: true
            separate_signature: true
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            separate_signature: true

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - admonition
  - def_list
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

